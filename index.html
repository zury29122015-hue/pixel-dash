<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL DASH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Press Start 2P',monospace;color:#fff;}
  #title{font-size:28px;color:#f7c948;text-shadow:4px 4px 0 #c4881e,0 0 30px #f7c94880;margin-bottom:10px;letter-spacing:4px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{text-shadow:4px 4px 0 #c4881e,0 0 30px #f7c94880;}50%{text-shadow:4px 4px 0 #c4881e,0 0 60px #f7c948cc;}}
  #hud{display:flex;gap:30px;margin-bottom:10px;font-size:10px;color:#a0e4ff;}
  #hud span{color:#f7c948;}
  #gameContainer{position:relative;border:3px solid #f7c948;box-shadow:0 0 30px #f7c94840,inset 0 0 30px #00000080;image-rendering:pixelated;}
  canvas{display:block;image-rendering:pixelated;}
  #overlay{position:absolute;inset:0;background:#0a0a1aee;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;overflow-y:auto;padding:16px;}
  #overlay h2{font-size:20px;color:#f7c948;text-shadow:3px 3px 0 #c4881e;}
  .mnu{font-family:'Press Start 2P',monospace;font-size:10px;padding:12px 0;width:230px;border:none;cursor:pointer;box-shadow:4px 4px 0 #c4881e;background:#f7c948;color:#0a0a1a;transition:transform .08s,box-shadow .08s;}
  .mnu:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #c4881e;}
  .mnu:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #c4881e;}
  .mnu.grn{background:#2ecc71;box-shadow:4px 4px 0 #1a7a43;}
  .mnu.grn:hover{box-shadow:6px 6px 0 #1a7a43;}
  .mnu.org{background:#e67e22;box-shadow:4px 4px 0 #8a4b13;}
  .mnu.org:hover{box-shadow:6px 6px 0 #8a4b13;}
  .mnu.red{background:#e74c3c;box-shadow:4px 4px 0 #8a2c24;}
  .mnu.red:hover{box-shadow:6px 6px 0 #8a2c24;}
  .smBtn{font-family:'Press Start 2P',monospace;font-size:8px;padding:8px 16px;background:transparent;border:1px solid #555;color:#888;cursor:pointer;margin-top:4px;}
  .smBtn:hover{border-color:#aaa;color:#ccc;}
  #unInput{font-family:'Press Start 2P',monospace;font-size:12px;padding:12px 16px;background:#111;border:2px solid #f7c948;color:#f7c948;outline:none;width:220px;text-align:center;letter-spacing:2px;}
  #unInput:focus{border-color:#fff;}
  #controls{font-size:7px;color:#555;text-align:center;line-height:2;margin-top:6px;}
  .lbTable{border-collapse:collapse;font-family:'Press Start 2P',monospace;font-size:7px;width:100%;max-width:400px;}
  .lbTable th{color:#555;padding:4px 8px;text-align:left;border-bottom:1px solid #333;}
  .lbTable td{padding:5px 8px;}
</style>
</head>
<body>
<div id="title">PIXEL DASH</div>
<div id="hud">
  SCORE:<span id="scoreDisplay">0</span>
  &nbsp;VIDAS:<span id="livesDisplay">❤️❤️❤️</span>
  &nbsp;NIVEL:<span id="levelDisplay">1</span>
  &nbsp;<span id="distDisplay" style="display:none">DIST:<span id="distNum" style="color:#f7c948">0</span>m</span>
</div>
<div id="gameContainer">
  <canvas id="gameCanvas" width="700" height="400"></canvas>
  <div id="overlay">
    <h2>PIXEL DASH</h2>
    <button class="mnu" id="startBtn">▶ JUGAR</button>
  </div>
</div>
<div id="controls">← → MOVER &nbsp;|&nbsp; ESPACIO SALTAR &nbsp;|&nbsp; S/↓+SALTO CAER &nbsp;|&nbsp; CLICK DER. DISPARAR</div>

<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const scoreEl=document.getElementById('scoreDisplay'),livesEl=document.getElementById('livesDisplay'),levelEl=document.getElementById('levelDisplay');
const distDisplay=document.getElementById('distDisplay'),distNum=document.getElementById('distNum');

let game,keys={},animFrame,username=localStorage.getItem('pd_user')||'';

const T={
  1:{label:'BOSQUE 🌲',skyT:'#0d0d2b',skyB:'#1a1a4e',gBase:'#1a3a1a',gMid:'#2a5f2a',gTop:'#3d8b3d',gTuft:'#5aab5a',pSh:'#5c2e00',pBase:'#8b4513',pTop:'#a0522d',pGr:'#7a3c0e',eB:'#cc00aa',eH:'#ee33cc',eHorn:'#ff5500',wpn:{name:'PIEDRA',col:'#aaa',glow:'#ddd',r:6,spd:8,dmg:1,pierce:false}},

// ── LEADERBOARD ──────────────────────────────────────────────────────
function getScores(){return JSON.parse(localStorage.getItem('pd_scores')||'[]');}
function addScore(user,score,theme){
  const s=getScores();
  s.push({user,score,map:T[theme]?.label.replace(/\s.*/,''),date:new Date().toLocaleDateString('es')});
  s.sort((a,b)=>b.score-a.score);
  localStorage.setItem('pd_scores',JSON.stringify(s.slice(0,50)));
}

// ── MENUS ────────────────────────────────────────────────────────────
function showUsernameInput(){
  overlay.innerHTML=`
    <h2 style="font-size:15px">¿CÓMO TE LLAMAS?</h2>
    <p style="font-size:7px;color:#666;text-align:center">Máx. 12 caracteres · Este nombre aparecerá en el ranking</p>
    <input id="unInput" type="text" maxlength="12" placeholder="TU NICK..." value="${username}"
      autocomplete="off" spellcheck="false">
    <button class="mnu" onclick="saveUsername()">✓ CONTINUAR</button>
  `;
  overlay.style.display='flex';
  setTimeout(()=>document.getElementById('unInput')?.focus(),60);
  document.getElementById('unInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')saveUsername();});
}
function saveUsername(){
  const v=(document.getElementById('unInput')?.value||'').trim().replace(/\s+/g,'_').toUpperCase().slice(0,12);
  if(v.length<2){const el=document.getElementById('unInput');if(el)el.style.borderColor='#ff3333';return;}
  username=v;localStorage.setItem('pd_user',username);showMainMenu();
}
function showMainMenu(){
  overlay.innerHTML=`
    <h2>PIXEL DASH</h2>
    <p style="font-size:7px;color:#888">Jugador: <span style="color:#f7c948">${username}</span></p>
    <button class="mnu" onclick="startNormal()">▶ JUGAR NORMAL</button>
    <button class="mnu grn" onclick="showMapSelect()">∞ MODO INFINITO</button>
    <button class="mnu org" onclick="showLeaderboard()">🏆 RANKING MUNDIAL</button>
    <button class="smBtn" onclick="showUsernameInput()">✏ CAMBIAR NOMBRE</button>
  `;
  overlay.style.display='flex';
}
function showMapSelect(){
  const btns=Object.entries(T).map(([k,th])=>`<button class="mnu" style="font-size:9px" onclick="startInfinite(${k})">${th.label}</button>`).join('');
  overlay.innerHTML=`
    <h2 style="font-size:15px">∞ ELIGE EL MAPA</h2>
    <p style="font-size:7px;color:#666">Corre infinitamente y acumula puntos</p>
    ${btns}
    <button class="smBtn" onclick="showMainMenu()">← VOLVER</button>
  `;
  overlay.style.display='flex';
}
function showLeaderboard(){
  const scores=getScores();
  const medal=['🥇','🥈','🥉'];
  const rows=scores.length?scores.slice(0,15).map((s,i)=>`
    <tr style="color:${i===0?'#f7c948':i<3?'#a0e4ff':'#ccc'}">
      <td>${medal[i]||'#'+(i+1)}</td>
      <td>${s.user}</td>
      <td style="color:#f7c948">${s.score.toLocaleString()}</td>
      <td style="color:#666">${s.map||'?'}</td>
      <td style="color:#444">${s.date||''}</td>
    </tr>`).join('')
    :`<tr><td colspan="5" style="padding:16px;color:#444;text-align:center">Nadie ha jugado aún 👀</td></tr>`;
  overlay.innerHTML=`
    <h2 style="font-size:15px">🏆 RANKING MUNDIAL</h2>
    <p style="font-size:6px;color:#444">Solo cuenta el Modo Infinito · Top 15</p>
    <div style="overflow-y:auto;max-height:260px;width:100%;max-width:420px">
      <table class="lbTable">
        <thead><tr><th>#</th><th>JUGADOR</th><th>PUNTOS</th><th>MAPA</th><th>FECHA</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <button class="mnu" onclick="showMainMenu()">← VOLVER</button>
  `;
  overlay.style.display='flex';
}
function showInfiniteGameOver(){
  addScore(username,game.score,game.theme);
  const all=getScores();
  const rank=all.findIndex(s=>s.user===username&&s.score===game.score)+1;
  overlay.innerHTML=`
    <h2 style="color:#ff3d3d">GAME OVER</h2>
    <p style="font-size:8px">Puntuación: <span style="color:#f7c948">${game.score.toLocaleString()}</span></p>
    <p style="font-size:7px;color:#a0e4ff">Tu puesto: <span style="color:#f7c948">#${rank||'?'}</span> en el ranking</p>
    <button class="mnu grn" onclick="startInfinite(${game.theme})">↺ REINTENTAR</button>
    <button class="mnu org" onclick="showLeaderboard()">🏆 VER RANKING</button>
    <button class="smBtn" onclick="showMainMenu()">← MENÚ</button>
  `;
  overlay.style.display='flex';
}

// ── NORMAL MODE ──────────────────────────────────────────────────────

// ── INFINITE MODE ─────────────────────────────────────────────────────
function startInfinite(theme){
  overlay.style.display='none';
  scoreEl.textContent='0';livesEl.textContent='❤️❤️❤️';levelEl.textContent='∞';
  distDisplay.style.display='inline';distNum.textContent='0';
  if(animFrame)cancelAnimationFrame(animFrame);
  initInfinite(theme);loop();
}
function initInfinite(theme){
  const H=canvas.height,gY=H-50;
  game={
    mode:'infinite',theme,level:theme,worldW:9999999,pSc:1,
    score:0,lives:3,over:false,won:false,cam:{x:0},
    player:{x:40,y:gY-36,w:26,h:36,vx:0,vy:0,onGround:false,onFloat:false,facing:1,inv:0,sc:1,dropTimer:0,crouching:false},
    platforms:[{x:0,y:gY,w:canvas.width+100,h:50,isGround:true}],
    coins:[],enemies:[],flag:{x:-9999,y:-9999},
    gY,particles:[],projectiles:[],fc:0,time:0,
    genX:canvas.width+100,lastPlatY:gY-90,diff:1,maxPX:0,distScore:0,
  };
  for(let i=0;i<10;i++) genNext();
}
function genNext(){
  const gY=game.gY,d=game.diff;
  const gap=55+Math.random()*(45+d*10);
  const w=Math.max(55,115-d*3+Math.random()*55);
  let ny=game.lastPlatY+(Math.random()>.5?-1:1)*(25+Math.random()*55);
  ny=Math.max(gY-275,Math.min(gY-60,ny));
  const px=game.genX+gap;
  game.platforms.push({x:px,y:ny,w,h:16});
  const nc=1+Math.floor(Math.random()*3);
  for(let i=0;i<nc;i++) game.coins.push({x:px+(i+1)*w/(nc+1),y:ny-22,c:false});
  if(Math.random()<Math.min(0.75,0.2+d*0.09)&&w>65){
    const hp=d>=4?2:1;
    game.enemies.push({x:px+10,y:ny-24,w:24,h:24,vx:0.8+d*0.18,dir:1,minX:px,maxX:px+w-24,hp,maxHp:hp,ft:0});
  }
  game.genX=px+w;game.lastPlatY=ny;
}

// ── PARTICLES ─────────────────────────────────────────────────────────
function spawnParts(x,y,col,n=8){
  for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2;game.particles.push({x,y,vx:Math.cos(a)*(2+Math.random()*3),vy:Math.sin(a)*(2+Math.random()*3),life:1,col,r:3+Math.random()*3});}
}

// ── UPDATE ────────────────────────────────────────────────────────────
function update(){
  if(!game||game.over||game.won) return;
  const p=game.player,th=T[game.level],spd=4,jmp=-13,grav=0.6;
  game.time++;

  p.vx=0;
  if(keys['ArrowLeft']||keys['a']){p.vx=-spd;p.facing=-1;}
  if(keys['ArrowRight']||keys['d']){p.vx=spd;p.facing=1;}

  const crouching=keys['ArrowDown']||keys['s'];
  const jumping=keys['ArrowUp']||keys[' ']||keys['w'];
  if(crouching&&jumping&&p.onFloat&&p.dropTimer<=0){p.dropTimer=18;p.vy=3;p.onGround=false;p.onFloat=false;}
  else if(jumping&&p.onGround){p.vy=jmp;p.onGround=false;}

  p.vy+=grav;p.x+=p.vx;p.y+=p.vy;
  p.x=Math.max(0,Math.min(game.worldW-p.w,p.x));

  if(p.dropTimer>0)p.dropTimer--;
  p.onGround=false;p.onFloat=false;
  for(const pl of game.platforms){
    if(p.dropTimer>0&&!pl.isGround) continue;
    if(p.x+p.w>pl.x&&p.x<pl.x+pl.w&&p.y+p.h>pl.y&&p.y+p.h<pl.y+pl.h+16&&p.vy>=0){
      p.y=pl.y-p.h;p.vy=0;p.onGround=true;if(!pl.isGround)p.onFloat=true;
    }
  }
  if(p.y>canvas.height+50){loseLife();return;}
  p.crouching=crouching&&p.onGround;
  if(p.inv>0)p.inv--;

  // Fire
  if((keys['z']||keys['Z']||keys['x']||keys['rclick'])&&game.fc<=0){
    const w=th.wpn;
    game.projectiles.push({x:p.x+(p.facing>0?p.w+2:-6),y:p.y+p.h*0.4,vx:w.spd*p.facing,r:w.r,col:w.col,glow:w.glow,dmg:w.dmg,pierce:w.pierce});
    game.fc=25;spawnParts(p.x+(p.facing>0?p.w:0),p.y+p.h*0.4,w.glow,3);
  }
  if(game.fc>0)game.fc--;

  // Projectiles
  game.projectiles=game.projectiles.filter(proj=>{
    proj.x+=proj.vx;
    if(proj.x<game.cam.x-80||proj.x>game.cam.x+canvas.width+80) return false;
    let dead=false;
    for(const e of game.enemies){
      if(e.x<-50) continue;
      if(proj.x+proj.r>e.x&&proj.x-proj.r<e.x+e.w&&proj.y+proj.r>e.y&&proj.y-proj.r<e.y+e.h){
        e.hp-=proj.dmg;e.ft=15;
        if(e.hp<=0){spawnParts(e.x+e.w/2,e.y+e.h/2,th.eB,10);e.x=-200;game.score+=50*game.level;scoreEl.textContent=game.score;}
        if(!proj.pierce){dead=true;break;}
      }
    }
    return !dead;
  });

  // Coins
  for(const c of game.coins){
    if(!c.c&&p.x+p.w>c.x-10&&p.x<c.x+10&&p.y+p.h>c.y-10&&p.y<c.y+10){
      c.c=true;
      const pts=game.mode==='infinite'?Math.round(10*game.diff):10*game.level;
      game.score+=pts;scoreEl.textContent=game.score;spawnParts(c.x,c.y,'#f7c948',6);
    }
  }

  // Enemies
  for(const e of game.enemies){
    if(e.x<-50) continue;
    if(e.ft>0)e.ft--;
    e.x+=e.vx*e.dir;
    if(e.x<=e.minX||e.x+e.w>=e.maxX)e.dir*=-1;
    if(p.inv<=0&&p.x+p.w-4>e.x&&p.x+4<e.x+e.w&&p.y+p.h-4>e.y&&p.y+4<e.y+e.h){
      if(p.vy>2&&p.y+p.h<e.y+e.h/2+10){
        e.hp--;e.ft=20;p.vy=-8;
        if(e.hp<=0){spawnParts(e.x+e.w/2,e.y+e.h/2,th.eB,10);e.x=-200;game.score+=50*(game.mode==='infinite'?Math.ceil(game.diff):game.level);}
        else game.score+=20;
        scoreEl.textContent=game.score;
      } else {loseLife();return;}
    }
  }

  // Flag (normal mode)
  if(game.killMsg>0) game.killMsg--;
  const f=game.flag;
  if(p.x+p.w>f.x&&p.x<f.x+20&&p.y+p.h>f.y&&p.y<f.y+80){
    const alive=game.enemies.filter(e=>e.x>-50&&e.hp>0);
    if(alive.length>0){
      game.killMsg=150;
    } else {
      game.won=true;game.score+=200*game.level;scoreEl.textContent=game.score;
      spawnParts(f.x+10,f.y+40,'#f7c948',20);setTimeout(()=>showEnd(true),1000);
    }
  }

  // Particles
  game.particles=game.particles.filter(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.2;pt.life-=0.04;return pt.life>0;});

  // Camera
  game.cam.x=Math.max(0,Math.min(game.worldW-canvas.width,p.x-canvas.width/2+p.w/2));

  // Infinite mode: generate & score
  if(game.mode==='infinite'){
    while(game.genX<game.cam.x+canvas.width+550) genNext();
    const cutoff=game.cam.x-400;
    game.platforms=game.platforms.filter(pl=>pl.isGround?pl.x+pl.w>cutoff:pl.x+pl.w>cutoff);
    game.coins=game.coins.filter(c=>c.x>cutoff);
    game.enemies=game.enemies.filter(e=>e.x>cutoff||e.x<-50);
    // Difficulty & distance score
    game.diff=1+Math.floor(p.x/1800)*0.4;
    game.maxPX=Math.max(game.maxPX,p.x);
    const ds=Math.floor(game.maxPX/90);
    if(ds>game.distScore){game.score+=ds-game.distScore;game.distScore=ds;scoreEl.textContent=game.score;}
    const meters=Math.floor(game.maxPX/30);
    distNum.textContent=meters;
  }
}

function loseLife(){
  game.lives--;
  livesEl.textContent='❤️'.repeat(Math.max(0,game.lives));
  spawnParts(game.player.x+game.player.w/2,game.player.y+game.player.h/2,'#e63946',12);
  if(game.lives<=0){
    game.over=true;
    if(game.mode==='infinite') setTimeout(()=>showInfiniteGameOver(),900);
    else setTimeout(()=>showEnd(false),800);
  } else {
    const p=game.player;
    if(game.mode==='infinite'){
      const vis=game.platforms.filter(pl=>!pl.isGround&&pl.x>game.cam.x&&pl.x<game.cam.x+canvas.width);
      if(vis.length){const pl=vis.sort((a,b)=>a.x-b.x)[0];p.x=pl.x+10;p.y=pl.y-p.h;}
      else{p.x=Math.max(40,game.cam.x+60);p.y=game.gY-p.h;}
    } else {p.x=40;p.y=game.gY-p.h;}
    p.vx=0;p.vy=0;p.inv=120;p.dropTimer=0;p.onFloat=false;
  }
}

function showEnd(won){
  overlay.innerHTML=`<h2 style="color:${won?'#3dff6e':'#ff3d3d'}">${won?'¡GANASTE!':'GAME OVER'}</h2>
  <p>Puntuación: <span style="color:#f7c948">${game.score.toLocaleString()}</span><br>${won?'Nivel completado 🏆':'Sin vidas 💀'}</p>
  <button class="mnu" onclick="restart(${won})">${won?'▶ SIGUIENTE NIVEL':'↺ REINTENTAR'}</button>
  <button class="smBtn" onclick="showMainMenu()">← MENÚ</button>`;
  overlay.style.display='flex';
}
function restart(next){
  overlay.style.display='none';distDisplay.style.display='none';
  if(next){const nl=(game.level%5)+1;levelEl.textContent=nl;initGame(nl);}
  else{scoreEl.textContent='0';livesEl.textContent='❤️❤️❤️';levelEl.textContent='1';game=null;initGame(1);}
}

function drawBg(t,lvl){
  const th=T[lvl],g=ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,th.skyT);g.addColorStop(1,th.skyB);
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  if(lvl===1){
    [[50,30],[120,60],[200,20],[280,45],[360,15],[440,55],[520,25],[600,40],[670,20],[90,80],[170,95],[300,70],[400,85],[500,75],[620,90]].forEach(([sx,sy])=>{ctx.globalAlpha=(0.5+0.5*Math.sin(t*0.05+sx))*0.8;ctx.fillStyle='#fff';ctx.fillRect(sx,sy,2,2);});
    ctx.globalAlpha=1;ctx.fillStyle='#fffde7';ctx.beginPath();ctx.arc(620,60,28,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a1a4e';ctx.beginPath();ctx.arc(630,54,24,0,Math.PI*2);ctx.fill();
  } else if(lvl===2){
    ctx.fillStyle='#222235';for(let i=-10;i<canvas.width+10;i+=32){const h=20+Math.sin(i*0.18)*13;ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+16,h);ctx.lineTo(i+32,0);ctx.closePath();ctx.fill();}
    for(let i=0;i<6;i++){ctx.fillStyle='#8800ff10';ctx.beginPath();ctx.arc(60+i*110,180+Math.sin(i)*35,32,0,Math.PI*2);ctx.fill();}
    for(let i=25;i<canvas.width;i+=50){const d=(t*0.35+i)%55;ctx.globalAlpha=0.2;ctx.fillStyle='#aa44ff';ctx.fillRect(i,16+d,2,7);}ctx.globalAlpha=1;
  } else if(lvl===3){
    ctx.fillStyle='rgba(255,255,255,0.65)';[[70,65,55],[210,42,75],[390,78,65],[545,48,58],[670,68,48]].forEach(([cx,cy,r])=>{const ox=((t*0.22+cx)%(canvas.width+120))-60;ctx.beginPath();ctx.arc(ox,cy,r*0.4,0,Math.PI*2);ctx.arc(ox+r*0.35,cy-r*0.2,r*0.5,0,Math.PI*2);ctx.arc(ox+r*0.65,cy,r*0.4,0,Math.PI*2);ctx.fill();});
    ctx.fillStyle='#ffff88';ctx.beginPath();ctx.arc(80,75,38,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffeeaa22';ctx.beginPath();ctx.arc(80,75,55,0,Math.PI*2);ctx.fill();
  } else if(lvl===4){
    const lp=0.5+0.5*Math.sin(t*0.05);ctx.fillStyle=`rgba(255,55,0,${0.12+lp*0.1})`;ctx.fillRect(0,canvas.height-100,canvas.width,100);ctx.fillStyle='#150000';ctx.beginPath();ctx.moveTo(540,canvas.height);ctx.lineTo(615,108);ctx.lineTo(690,canvas.height);ctx.closePath();ctx.fill();ctx.fillStyle=`rgba(255,80,0,${0.55+lp*0.45})`;ctx.fillRect(612,106,6,42);
    for(let i=0;i<10;i++){ctx.globalAlpha=0.18;ctx.fillStyle='#999';ctx.fillRect((t*0.4+i*53)%canvas.width,(t*0.22+i*39)%(canvas.height-40),2,2);}ctx.globalAlpha=1;
  } else {
    for(let i=0;i<55;i++){const sx=(i*137+50)%canvas.width,sy=(i*93+28)%(canvas.height-55);ctx.globalAlpha=0.35+0.65*Math.sin(t*0.03+i);ctx.fillStyle=i%5===0?'#aaffff':i%3===0?'#ffaaff':'#fff';ctx.fillRect(sx,sy,i%4===0?2:1,i%4===0?2:1);}
    ctx.globalAlpha=1;ctx.fillStyle='#334488';ctx.beginPath();ctx.arc(100,88,52,0,Math.PI*2);ctx.fill();ctx.fillStyle='#445599';ctx.beginPath();ctx.arc(88,78,30,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#6677aa';ctx.lineWidth=5;ctx.beginPath();ctx.ellipse(100,88,72,16,-0.3,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#ff00ff09';ctx.beginPath();ctx.arc(490,145,100,0,Math.PI*2);ctx.fill();
  }
}
function drawPlatform(pl,lvl){
  const th=T[lvl];
  if(pl.isGround){
    ctx.fillStyle=th.gBase;ctx.fillRect(pl.x,pl.y,pl.w,pl.h);ctx.fillStyle=th.gMid;ctx.fillRect(pl.x,pl.y,pl.w,pl.h-8);ctx.fillStyle=th.gTop;ctx.fillRect(pl.x,pl.y,pl.w,10);
    if(lvl===1){ctx.fillStyle=th.gTuft;for(let i=10;i<pl.w;i+=24){ctx.fillRect(pl.x+i,pl.y-4,3,6);ctx.fillRect(pl.x+i+6,pl.y-6,3,8);ctx.fillRect(pl.x+i+12,pl.y-3,3,5);}}
    else if(lvl===2){ctx.fillStyle=th.gTuft;for(let i=10;i<pl.w;i+=42){ctx.fillRect(pl.x+i,pl.y-7,3,8);ctx.fillRect(pl.x+i+10,pl.y-11,4,12);ctx.fillRect(pl.x+i+20,pl.y-6,3,7);}}
    else if(lvl===3){ctx.fillStyle='rgba(255,255,255,0.88)';for(let i=10;i<pl.w;i+=48){ctx.beginPath();ctx.arc(pl.x+i+10,pl.y-5,13,0,Math.PI*2);ctx.arc(pl.x+i+24,pl.y-10,16,0,Math.PI*2);ctx.arc(pl.x+i+38,pl.y-4,11,0,Math.PI*2);ctx.fill();}}
    else if(lvl===4){ctx.fillStyle=th.gTuft;for(let i=8;i<pl.w;i+=40){ctx.fillRect(pl.x+i,pl.y-4,4,5);ctx.fillRect(pl.x+i+15,pl.y-6,3,7);}ctx.fillStyle='#ff440033';for(let i=5;i<pl.w;i+=55)ctx.fillRect(pl.x+i,pl.y,3,9);}
    else{ctx.fillStyle=th.gTuft;ctx.fillRect(pl.x,pl.y,pl.w,3);for(let i=0;i<pl.w;i+=28)ctx.fillRect(pl.x+i,pl.y,2,9);}
  } else {
    if(lvl===3){ctx.fillStyle='rgba(255,255,255,0.82)';ctx.beginPath();ctx.arc(pl.x+12,pl.y+7,12,Math.PI,Math.PI*2);ctx.arc(pl.x+pl.w/2,pl.y-7,16,Math.PI,Math.PI*2);ctx.arc(pl.x+pl.w-12,pl.y+7,12,Math.PI,Math.PI*2);ctx.fill();ctx.fillRect(pl.x,pl.y+7,pl.w,9);}
    else{ctx.fillStyle=th.pSh;ctx.fillRect(pl.x+2,pl.y+2,pl.w,pl.h);ctx.fillStyle=th.pBase;ctx.fillRect(pl.x,pl.y,pl.w,pl.h);ctx.fillStyle=th.pTop;ctx.fillRect(pl.x,pl.y,pl.w,5);
      if(lvl===1){ctx.fillStyle=th.pGr;for(let i=12;i<pl.w;i+=18)ctx.fillRect(pl.x+i,pl.y+5,2,pl.h-8);}
      else if(lvl===2){ctx.fillStyle=th.pGr;for(let i=0;i<pl.w;i+=20)ctx.fillRect(pl.x+i,pl.y,1,pl.h);ctx.fillRect(pl.x,pl.y+Math.floor(pl.h/2),pl.w,1);}
      else if(lvl===4){ctx.fillStyle=th.pGr;for(let i=7;i<pl.w;i+=18)ctx.fillRect(pl.x+i,pl.y+1,2,pl.h-2);}
      else if(lvl===5){ctx.fillStyle=th.pGr;for(let i=0;i<pl.w;i+=13)ctx.fillRect(pl.x+i,pl.y,1,pl.h);ctx.fillRect(pl.x,pl.y,pl.w,2);ctx.fillRect(pl.x,pl.y+pl.h-2,pl.w,2);}
    }
  }
}
function drawPlayer(p){
  if(p.inv>0&&Math.floor(p.inv/6)%2===0) return;
  const x=Math.round(p.x),y=Math.round(p.y),s=p.sc||1;
  ctx.save();
  if(p.crouching){ctx.translate(x+p.w/2,y+p.h);ctx.scale(1.2,0.52);ctx.translate(-(x+p.w/2),-(y+p.h));}
  ctx.fillStyle='#e63946';ctx.fillRect(x+4*s,y+10*s,18*s,22*s);
  ctx.fillStyle='#ffd6a5';ctx.fillRect(x+3*s,y,20*s,16*s);
  ctx.fillStyle='#4a2c0a';ctx.fillRect(x+3*s,y,20*s,5*s);
  ctx.fillStyle='#222';ctx.fillRect(p.facing>0?x+16*s:x+6*s,y+7*s,4*s,4*s);
  ctx.fillStyle='#1a1a3e';ctx.fillRect(x+5*s,y+30*s,7*s,6*s);ctx.fillRect(x+14*s,y+30*s,7*s,6*s);
  ctx.fillStyle='#333';ctx.fillRect(x+4*s,y+34*s,9*s,4*s);ctx.fillRect(x+13*s,y+34*s,9*s,4*s);
  ctx.restore();
}
function drawEnemy(e,lvl){
  if(e.x<-50) return;
  const x=Math.round(e.x),y=Math.round(e.y),th=T[lvl],fl=e.ft>0&&Math.floor(e.ft/4)%2===0;
  if(lvl===1||lvl===4){
    ctx.fillStyle=fl?'#fff':th.eB;ctx.fillRect(x,y+6,e.w,e.h-6);ctx.fillStyle=fl?'#fff':th.eH;ctx.fillRect(x+2,y,e.w-4,13);
    if(!fl){ctx.fillStyle='#fff';ctx.fillRect(x+4,y+3,5,5);ctx.fillRect(x+e.w-9,y+3,5,5);ctx.fillStyle='#000';ctx.fillRect(x+(e.dir>0?7:5),y+4,2,3);ctx.fillRect(x+(e.dir>0?e.w-7:e.w-9),y+4,2,3);ctx.fillStyle=th.eHorn;ctx.fillRect(x+3,y-5,4,7);ctx.fillRect(x+e.w-7,y-5,4,7);if(lvl===4){ctx.fillStyle='#ff6600';ctx.fillRect(x+2,y+e.h-1,4,6);ctx.fillRect(x+e.w-6,y+e.h-1,4,6);}}
  } else if(lvl===2){
    const cx=x+e.w/2,cy=y+e.h/2;ctx.fillStyle=fl?'#fff':th.eH;ctx.beginPath();ctx.moveTo(cx-3,cy);ctx.lineTo(x-9,y+5);ctx.lineTo(x+1,y+e.h-3);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(cx+3,cy);ctx.lineTo(x+e.w+9,y+5);ctx.lineTo(x+e.w-1,y+e.h-3);ctx.closePath();ctx.fill();ctx.fillStyle=fl?'#fff':th.eB;ctx.beginPath();ctx.arc(cx,cy,e.w*0.34,0,Math.PI*2);ctx.fill();
    if(!fl){ctx.fillStyle='#ff0000';ctx.fillRect(cx-5,y+4,4,3);ctx.fillRect(cx+1,y+4,4,3);ctx.fillStyle='#fff';ctx.fillRect(cx-2,y+e.h-1,2,6);ctx.fillRect(cx+2,y+e.h-1,2,6);}
  } else if(lvl===3){
    const cx=x+e.w/2,cy=y+e.h/2,wf=Math.sin(game.time*0.25)*6;ctx.fillStyle=fl?'#fff':th.eH;ctx.fillRect(x-6,cy-3-wf,8,5);ctx.fillRect(x+e.w-2,cy-3-wf,8,5);ctx.fillStyle=fl?'#fff':th.eB;ctx.beginPath();ctx.arc(cx,cy,e.w*0.38,0,Math.PI*2);ctx.fill();
    if(!fl){ctx.fillStyle='#ffaa00';ctx.fillRect(e.dir>0?x+e.w-2:x-6,cy-1,6,3);ctx.fillStyle='#fff';ctx.fillRect(cx+(e.dir>0?-9:2),cy-5,5,5);ctx.fillStyle='#000';ctx.fillRect(cx+(e.dir>0?-8:3),cy-4,2,3);}
  } else if(lvl===5){
    const cx=x+e.w/2,cy=y+e.h/2;ctx.fillStyle=fl?'#fff':th.eB;ctx.fillRect(x+4,cy+2,e.w-8,e.h/2-2);ctx.fillStyle=fl?'#fff':th.eH;ctx.beginPath();ctx.arc(cx,cy-1,e.w*0.44,0,Math.PI*2);ctx.fill();
    if(!fl){ctx.fillStyle='#001100';ctx.beginPath();ctx.arc(cx,cy-1,e.w*0.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#00ff44';ctx.beginPath();ctx.arc(cx,cy-1,e.w*0.09,0,Math.PI*2);ctx.fill();ctx.fillStyle=th.eHorn;ctx.fillRect(cx-1,y-9,2,9);ctx.beginPath();ctx.arc(cx,y-9,3,0,Math.PI*2);ctx.fill();}
  }
  if(e.maxHp>1){ctx.fillStyle='#333';ctx.fillRect(x,y-10,e.w,4);ctx.fillStyle=e.hp/e.maxHp>0.5?'#44ff44':'#ff4444';ctx.fillRect(x,y-10,e.w*(e.hp/e.maxHp),4);}
}
function drawCoin(c,t){
  if(c.c) return;
  const wb=Math.sin(t*0.07+c.x)*3,cx=Math.round(c.x),cy=Math.round(c.y+wb);
  ctx.fillStyle='#f7c948';ctx.beginPath();ctx.arc(cx,cy,9,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff8';ctx.beginPath();ctx.arc(cx-2,cy-2,3,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#c4881e';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,9,0,Math.PI*2);ctx.stroke();
}
function drawFlag(f,t){
  ctx.fillStyle='#aaa';ctx.fillRect(f.x+8,f.y-10,4,90);const w=Math.sin(t*0.08)*4;ctx.fillStyle='#e63946';ctx.beginPath();ctx.moveTo(f.x+12,f.y-10);ctx.lineTo(f.x+36+w,f.y+2);ctx.lineTo(f.x+12,f.y+14);ctx.closePath();ctx.fill();
}
function drawProjectile(proj,lvl){
  ctx.save();ctx.shadowColor=proj.glow;ctx.shadowBlur=14;ctx.fillStyle=proj.col;const d=Math.sign(proj.vx);
  if(lvl===5){ctx.strokeStyle=proj.col;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(proj.x-22*d,proj.y);ctx.lineTo(proj.x+22*d,proj.y);ctx.stroke();ctx.globalAlpha=0.5;ctx.lineWidth=8;ctx.strokeStyle=proj.glow;ctx.beginPath();ctx.moveTo(proj.x-22*d,proj.y);ctx.lineTo(proj.x+22*d,proj.y);ctx.stroke();}
  else if(lvl===3){ctx.strokeStyle=proj.col;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(proj.x-12*d,proj.y);ctx.lineTo(proj.x-4*d,proj.y-7);ctx.lineTo(proj.x+4*d,proj.y+5);ctx.lineTo(proj.x+12*d,proj.y-2);ctx.stroke();ctx.globalAlpha=0.35;ctx.lineWidth=7;ctx.strokeStyle='#fff';ctx.stroke();}
  else{ctx.beginPath();ctx.arc(proj.x,proj.y,proj.r,0,Math.PI*2);ctx.fill();if(lvl===2){ctx.globalAlpha=1;ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(proj.x,proj.y-proj.r);ctx.lineTo(proj.x+4*d,proj.y-proj.r-5);ctx.stroke();ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(proj.x+4*d,proj.y-proj.r-5,2.5,0,Math.PI*2);ctx.fill();}else if(lvl===4){ctx.globalAlpha=0.45;ctx.fillStyle='#ffaa00';ctx.beginPath();ctx.arc(proj.x-proj.vx*2,proj.y,proj.r*0.65,0,Math.PI*2);ctx.fill();}}
  ctx.restore();
}
function drawMinimap(){
  if(!game||game.worldW<=canvas.width+500) return;
  const mw=120,mh=8,mx=canvas.width-mw-10,my=10;
  ctx.fillStyle='#ffffff15';ctx.fillRect(mx,my,mw,mh);ctx.fillStyle='#e63946';ctx.fillRect(mx+(game.player.x/game.worldW)*mw-2,my,4,mh);
  if(game.mode!=='infinite'){ctx.fillStyle='#f7c948';ctx.fillRect(mx+(game.flag.x/game.worldW)*mw,my,3,mh);}
  ctx.strokeStyle='#ffffff30';ctx.lineWidth=1;ctx.strokeRect(mx,my,mw,mh);
}
function drawHUD(){
  const th=T[game.level],w=th.wpn;
  ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(8,8,165,18);
  ctx.fillStyle=w.glow;ctx.font='7px "Press Start 2P",monospace';
  if(game.mode==='infinite'){
    ctx.fillText(`∞ ${th.label.replace(/ .*/,'')}  x${game.diff.toFixed(1)}`,13,21);
  } else {
    ctx.fillText(th.label.replace(/ .*/,'')+' ⚔ '+w.name,13,21);
  }
  if(username==='ULTRA_GAMES'&&game.mode==='normal'){
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(8,30,148,14);
    ctx.fillStyle='#ff00ff';ctx.font='6px "Press Start 2P",monospace';
    ctx.fillText('🔧 [N] NEXT  [B] PREV',13,41);
  }
}
function draw(){
  if(!game) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBg(game.time,game.level);
  ctx.save();ctx.translate(-game.cam.x,0);
  for(const pl of game.platforms) drawPlatform(pl,game.level);
  if(game.mode!=='infinite') drawFlag(game.flag,game.time);
  for(const c of game.coins) drawCoin(c,game.time);
  for(const e of game.enemies) drawEnemy(e,game.level);
  drawPlayer(game.player);
  for(const proj of game.projectiles) drawProjectile(proj,game.level);
  for(const pt of game.particles){ctx.globalAlpha=pt.life;ctx.fillStyle=pt.col;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;ctx.restore();
  if(game.killMsg>0&&game.mode==='normal'){
    const a=Math.min(1,game.killMsg/20);
    const alive=game.enemies.filter(e=>e.x>-50&&e.hp>0).length;
    ctx.save();ctx.globalAlpha=a;
    ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(canvas.width/2-192,canvas.height/2-34,384,62);
    ctx.fillStyle='#ff3333';ctx.font='11px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText('¡MATA A TODOS LOS ENEMIGOS!',canvas.width/2,canvas.height/2-10);
    ctx.fillStyle='#ffcc00';ctx.font='7px "Press Start 2P",monospace';
    ctx.fillText('Quedan '+alive+' enemigo'+(alive===1?'':'s')+' vivos',canvas.width/2,canvas.height/2+16);
    ctx.textAlign='left';ctx.restore();
  }
  drawMinimap();drawHUD();
}
function loop(){update();draw();animFrame=requestAnimationFrame(loop);}

// ── CONTROLS ──────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click',()=>{
  if(!username) showUsernameInput();
  else showMainMenu();
});
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' ')e.preventDefault();
  // ULTRA_GAMES skip: N = siguiente nivel, B = nivel anterior
  if(username==='ULTRA_GAMES'&&game&&game.mode==='normal'&&!game.over&&!game.won){
    if(e.key==='n'||e.key==='N'){
      cancelAnimationFrame(animFrame);
      const nl=game.level<5?game.level+1:1;
      scoreEl.textContent=game.score;levelEl.textContent=nl;
      initGame(nl);loop();
    }
    if(e.key==='b'||e.key==='B'){
      cancelAnimationFrame(animFrame);
      const pl=game.level>1?game.level-1:5;
      scoreEl.textContent=game.score;levelEl.textContent=pl;
      initGame(pl);loop();
    }
  }
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('mousedown',e=>{if(e.button===2||e.button===0){keys['rclick']=true;e.preventDefault();}});
window.addEventListener('mouseup',e=>{if(e.button===2||e.button===0)keys['rclick']=false;});

// Mobile
const ms=document.createElement('style');
ms.textContent=`#mc{display:flex;gap:10px;margin-top:10px;}.mB{font-family:'Press Start 2P',monospace;font-size:11px;width:52px;height:52px;background:#f7c94820;border:2px solid #f7c948;color:#f7c948;cursor:pointer;user-select:none;border-radius:4px;display:flex;align-items:center;justify-content:center;}.mB:active{background:#f7c94840;}`;
document.head.appendChild(ms);
const mc=document.createElement('div');mc.id='mc';
mc.innerHTML=`<button class="mB" id="mL">◀</button><button class="mB" id="mJ">↑</button><button class="mB" id="mF">⚡</button><button class="mB" id="mR">▶</button>`;
document.body.appendChild(mc);
[['mL','ArrowLeft'],['mR','ArrowRight'],['mJ',' '],['mF','z']].forEach(([id,k])=>{
  document.getElementById(id).addEventListener('touchstart',e=>{keys[k]=true;e.preventDefault();},{passive:false});
  document.getElementById(id).addEventListener('touchend',()=>keys[k]=false);
});
</script>
