<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>PIXEL DASH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Press Start 2P',monospace;color:#fff;}
  #title{font-size:28px;color:#f7c948;text-shadow:4px 4px 0 #c4881e,0 0 30px #f7c94880;margin-bottom:10px;letter-spacing:4px;animation:pulse 2s infinite;}

  #startBtn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #c4881e;}
  #controls{font-size:8px;color:#666;text-align:center;line-height:2;margin-top:6px;}
</style>
</head>

      {x:600,y:gY-eh,w:ew,h:eh,vx:1.8,dir:-1,minX:450,maxX:800,hp:3,maxHp:3,ft:0},
      {x:1000,y:gY-eh,w:ew,h:eh,vx:2,dir:1,minX:900,maxX:1200,hp:3,maxHp:3,ft:0},
      {x:1300,y:gY-eh,w:ew,h:eh,vx:1.8,dir:-1,minX:1100,maxX:1500,hp:3,maxHp:3,ft:0},
      {x:1700,y:gY-eh,w:ew,h:eh,vx:2,dir:1,minX:1600,maxX:1900,hp:3,maxHp:3,ft:0},
      {x:490,y:gY-210-pe,w:pe,h:pe,vx:1.5,dir:1,minX:460,maxX:598,hp:2,maxHp:2,ft:0},
      {x:1160,y:gY-170-pe,w:pe,h:pe,vx:1.5,dir:1,minX:1130,maxX:1278,hp:2,maxHp:2,ft:0},
    ];
    flagX=2060;

  } else {
    platforms=[
      {x:0,y:gY,w:worldW,h:50,isGround:true},
      {x:150,y:gY-100,w:120,h:16},{x:320,y:gY-160,w:100,h:16},
      {x:480,y:gY-100,w:120,h:16},{x:650,y:gY-180,w:90,h:16},
      {x:800,y:gY-120,w:110,h:16},{x:980,y:gY-200,w:100,h:16},

      {x:1500,y:gY-110,w:110,h:16},{x:1670,y:gY-190,w:100,h:16},
      {x:1850,y:gY-130,w:120,h:16},{x:2030,y:gY-170,w:90,h:16},
      {x:2200,y:gY-100,w:110,h:16},{x:2380,y:gY-200,w:100,h:16},

      {x:2850,y:gY-100,w:100,h:16},

function spawnParts(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    game.particles.push({x,y,vx:Math.cos(a)*(2+Math.random()*3),vy:Math.sin(a)*(2+Math.random()*3),life:1,col,r:3+Math.random()*3});
  }
}

// ── UPDATE ───────────────────────────────────────────────────────────
function update(){
  if(!game||game.over||game.won) return;
  const p=game.player, th=T[game.level], spd=4, jmp=-13, grav=0.6;
  game.time++;

  p.vx=0;
  if(keys['ArrowLeft']||keys['a']){p.vx=-spd;p.facing=-1;}
  if(keys['ArrowRight']||keys['d']){p.vx=spd;p.facing=1;}
  if((keys['ArrowUp']||keys[' ']||keys['w'])&&p.onGround){p.vy=jmp;p.onGround=false;}

  p.vy+=grav; p.x+=p.vx; p.y+=p.vy;
  p.x=Math.max(0,Math.min(game.worldW-p.w,p.x));

  p.onGround=false;
  for(const pl of game.platforms){
    if(p.x+p.w>pl.x&&p.x<pl.x+pl.w&&p.y+p.h>pl.y&&p.y+p.h<pl.y+pl.h+16&&p.vy>=0){
      p.y=pl.y-p.h;p.vy=0;p.onGround=true;
    }
  }
  if(p.y>canvas.height+50){loseLife();return;}
  if(p.inv>0) p.inv--;

  // Fire
  if((keys['z']||keys['Z']||keys['x'])&&game.fc<=0){
    const w=th.wpn;
    game.projectiles.push({x:p.x+(p.facing>0?p.w+2:-6),y:p.y+p.h*0.4,vx:w.spd*p.facing,r:w.r,col:w.col,glow:w.glow,dmg:w.dmg,pierce:w.pierce});
    game.fc=25;
    spawnParts(p.x+(p.facing>0?p.w:0),p.y+p.h*0.4,w.glow,3);
  }
  if(game.fc>0) game.fc--;

  // Projectiles
  game.projectiles=game.projectiles.filter(proj=>{
    proj.x+=proj.vx;
    if(proj.x<game.cam.x-80||proj.x>game.cam.x+canvas.width+80) return false;
    let dead=false;
    for(const e of game.enemies){
      if(e.x<-50) continue;
      if(proj.x+proj.r>e.x&&proj.x-proj.r<e.x+e.w&&proj.y+proj.r>e.y&&proj.y-proj.r<e.y+e.h){
        e.hp-=proj.dmg; e.ft=15;
        if(e.hp<=0){spawnParts(e.x+e.w/2,e.y+e.h/2,th.eB,10);e.x=-200;game.score+=50*game.level;scoreEl.textContent=game.score;}
        if(!proj.pierce){dead=true;break;}
      }
    }
    return !dead;
  });

  // Coins
  for(const c of game.coins){
    if(!c.c&&p.x+p.w>c.x-10&&p.x<c.x+10&&p.y+p.h>c.y-10&&p.y<c.y+10){
      c.c=true;game.score+=10*game.level;scoreEl.textContent=game.score;spawnParts(c.x,c.y,'#f7c948',6);
    }
  }

  // Enemies
  for(const e of game.enemies){
    if(e.x<-50) continue;
    if(e.ft>0) e.ft--;
    e.x+=e.vx*e.dir;
    if(e.x<=e.minX||e.x+e.w>=e.maxX) e.dir*=-1;
    if(p.inv<=0&&p.x+p.w-4>e.x&&p.x+4<e.x+e.w&&p.y+p.h-4>e.y&&p.y+4<e.y+e.h){
      if(p.vy>2&&p.y+p.h<e.y+e.h/2+10){
        e.hp--;e.ft=20;p.vy=-8;
        if(e.hp<=0){spawnParts(e.x+e.w/2,e.y+e.h/2,th.eB,10);e.x=-200;game.score+=50*game.level;}
        else game.score+=20;
        scoreEl.textContent=game.score;
      } else {loseLife();return;}
    }
  }

  const f=game.flag;
  if(p.x+p.w>f.x&&p.x<f.x+20&&p.y+p.h>f.y&&p.y<f.y+80){
    game.won=true;game.score+=200*game.level;scoreEl.textContent=game.score;
    spawnParts(f.x+10,f.y+40,'#f7c948',20);
    setTimeout(()=>showEnd(true),1000);
  }

  game.particles=game.particles.filter(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.2;pt.life-=0.04;return pt.life>0;});
  game.cam.x=Math.max(0,Math.min(game.worldW-canvas.width,p.x-canvas.width/2+p.w/2));
}

function loseLife(){
  game.lives--;
  livesEl.textContent='❤️'.repeat(Math.max(0,game.lives));
  spawnParts(game.player.x+game.player.w/2,game.player.y+game.player.h/2,'#e63946',12);
  if(game.lives<=0){game.over=true;setTimeout(()=>showEnd(false),800);}
  else{const p=game.player;p.x=40;p.y=game.gY-p.h;p.vx=0;p.vy=0;p.inv=120;}
}

function showEnd(won){
  overlay.innerHTML=`<h2 style="color:${won?'#3dff6e':'#ff3d3d'}">${won?'¡GANASTE!':'GAME OVER'}</h2>
  <p>Puntuación: <span style="color:#f7c948">${game.score}</span><br>${won?'Nivel completado 🏆':'Sin vidas 💀'}</p>
  <button id="startBtn" onclick="restart(${won})">${won?'▶ SIGUIENTE NIVEL':'↺ REINTENTAR'}</button>`;
  overlay.style.display='flex';
}

function restart(next){
  overlay.style.display='none';
  if(next){const nl=(game.level%5)+1;levelEl.textContent=nl;initGame(nl);}
  else{scoreEl.textContent='0';livesEl.textContent='❤️❤️❤️';levelEl.textContent='1';game=null;initGame(1);}
}

// ── DRAW ─────────────────────────────────────────────────────────────
function drawBg(t,lvl){
  const th=T[lvl];
  const g=ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,th.skyT);g.addColorStop(1,th.skyB);
  ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);

  if(lvl===1){
    [[50,30],[120,60],[200,20],[280,45],[360,15],[440,55],[520,25],[600,40],[670,20],[90,80],[170,95],[300,70],[400,85],[500,75],[620,90]].forEach(([sx,sy])=>{
      ctx.globalAlpha=(0.5+0.5*Math.sin(t*0.05+sx))*0.8;ctx.fillStyle='#fff';ctx.fillRect(sx,sy,2,2);
    });
    ctx.globalAlpha=1;
    ctx.fillStyle='#fffde7';ctx.beginPath();ctx.arc(620,60,28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a4e';ctx.beginPath();ctx.arc(630,54,24,0,Math.PI*2);ctx.fill();
  } else if(lvl===2){
    ctx.fillStyle='#222235';
    for(let i=-10;i<canvas.width+10;i+=32){
      const h=20+Math.sin(i*0.18)*13;
      ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+16,h);ctx.lineTo(i+32,0);ctx.closePath();ctx.fill();
    }
    for(let i=0;i<6;i++){ctx.fillStyle='#8800ff10';ctx.beginPath();ctx.arc(60+i*110,180+Math.sin(i)*35,32,0,Math.PI*2);ctx.fill();}
    for(let i=25;i<canvas.width;i+=50){
      const d=(t*0.35+i)%55;ctx.globalAlpha=0.2;ctx.fillStyle='#aa44ff';ctx.fillRect(i,16+d,2,7);
    }
    ctx.globalAlpha=1;
  } else if(lvl===3){
    ctx.fillStyle='rgba(255,255,255,0.65)';
    [[70,65,55],[210,42,75],[390,78,65],[545,48,58],[670,68,48]].forEach(([cx,cy,r])=>{
      const ox=((t*0.22+cx)%(canvas.width+120))-60;
      ctx.beginPath();ctx.arc(ox,cy,r*0.4,0,Math.PI*2);ctx.arc(ox+r*0.35,cy-r*0.2,r*0.5,0,Math.PI*2);ctx.arc(ox+r*0.65,cy,r*0.4,0,Math.PI*2);ctx.fill();
    });
    ctx.fillStyle='#ffff88';ctx.beginPath();ctx.arc(80,75,38,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffeeaa22';ctx.beginPath();ctx.arc(80,75,55,0,Math.PI*2);ctx.fill();
  } else if(lvl===4){
    const lp=0.5+0.5*Math.sin(t*0.05);
    ctx.fillStyle=`rgba(255,55,0,${0.12+lp*0.1})`;ctx.fillRect(0,canvas.height-100,canvas.width,100);
    ctx.fillStyle='#150000';
    ctx.beginPath();ctx.moveTo(540,canvas.height);ctx.lineTo(615,108);ctx.lineTo(690,canvas.height);ctx.closePath();ctx.fill();
    ctx.fillStyle=`rgba(255,80,0,${0.55+lp*0.45})`;ctx.fillRect(612,106,6,42);
    for(let i=0;i<10;i++){ctx.globalAlpha=0.18;ctx.fillStyle='#999';ctx.fillRect((t*0.4+i*53)%canvas.width,(t*0.22+i*39)%(canvas.height-40),2,2);}
    ctx.globalAlpha=1;
  } else {
    for(let i=0;i<55;i++){
      const sx=(i*137+50)%canvas.width,sy=(i*93+28)%(canvas.height-55);
      ctx.globalAlpha=0.35+0.65*Math.sin(t*0.03+i);
      ctx.fillStyle=i%5===0?'#aaffff':i%3===0?'#ffaaff':'#fff';
      ctx.fillRect(sx,sy,i%4===0?2:1,i%4===0?2:1);
    }
    ctx.globalAlpha=1;
    ctx.fillStyle='#334488';ctx.beginPath();ctx.arc(100,88,52,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#445599';ctx.beginPath();ctx.arc(88,78,30,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#6677aa';ctx.lineWidth=5;ctx.beginPath();ctx.ellipse(100,88,72,16,-0.3,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#ff00ff09';ctx.beginPath();ctx.arc(490,145,100,0,Math.PI*2);ctx.fill();
  }
}

function drawPlatform(pl,lvl){
  const th=T[lvl];
  if(pl.isGround){
    ctx.fillStyle=th.gBase;ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    ctx.fillStyle=th.gMid;ctx.fillRect(pl.x,pl.y,pl.w,pl.h-8);
    ctx.fillStyle=th.gTop;ctx.fillRect(pl.x,pl.y,pl.w,10);
    if(lvl===1||lvl===4||lvl===5){
      if(lvl===1){ctx.fillStyle=th.gTuft;for(let i=10;i<pl.w;i+=24){ctx.fillRect(pl.x+i,pl.y-4,3,6);ctx.fillRect(pl.x+i+6,pl.y-6,3,8);ctx.fillRect(pl.x+i+12,pl.y-3,3,5);}}
      else if(lvl===4){ctx.fillStyle=th.gTuft;for(let i=8;i<pl.w;i+=40){ctx.fillRect(pl.x+i,pl.y-4,4,5);ctx.fillRect(pl.x+i+15,pl.y-6,3,7);}ctx.fillStyle='#ff440033';for(let i=5;i<pl.w;i+=55){ctx.fillRect(pl.x+i,pl.y,3,9);}}
      else{ctx.fillStyle=th.gTuft;ctx.fillRect(pl.x,pl.y,pl.w,3);for(let i=0;i<pl.w;i+=28)ctx.fillRect(pl.x+i,pl.y,2,9);}
    } else if(lvl===2){
      ctx.fillStyle=th.gTuft;for(let i=10;i<pl.w;i+=42){ctx.fillRect(pl.x+i,pl.y-7,3,8);ctx.fillRect(pl.x+i+10,pl.y-11,4,12);ctx.fillRect(pl.x+i+20,pl.y-6,3,7);}
    } else if(lvl===3){
      ctx.fillStyle='rgba(255,255,255,0.88)';
      for(let i=10;i<pl.w;i+=48){ctx.beginPath();ctx.arc(pl.x+i+10,pl.y-5,13,0,Math.PI*2);ctx.arc(pl.x+i+24,pl.y-10,16,0,Math.PI*2);ctx.arc(pl.x+i+38,pl.y-4,11,0,Math.PI*2);ctx.fill();}
    }
  } else {
    if(lvl===3){
      ctx.fillStyle='rgba(255,255,255,0.82)';
      ctx.beginPath();ctx.arc(pl.x+12,pl.y+7,12,Math.PI,Math.PI*2);ctx.arc(pl.x+pl.w/2,pl.y-7,16,Math.PI,Math.PI*2);ctx.arc(pl.x+pl.w-12,pl.y+7,12,Math.PI,Math.PI*2);ctx.fill();
      ctx.fillRect(pl.x,pl.y+7,pl.w,9);
    } else {
      ctx.fillStyle=th.pSh;ctx.fillRect(pl.x+2,pl.y+2,pl.w,pl.h);
      ctx.fillStyle=th.pBase;ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
      ctx.fillStyle=th.pTop;ctx.fillRect(pl.x,pl.y,pl.w,5);
      if(lvl===1){ctx.fillStyle=th.pGr;for(let i=12;i<pl.w;i+=18)ctx.fillRect(pl.x+i,pl.y+5,2,pl.h-8);}
      else if(lvl===2){ctx.fillStyle=th.pGr;for(let i=0;i<pl.w;i+=20)ctx.fillRect(pl.x+i,pl.y,1,pl.h);ctx.fillRect(pl.x,pl.y+Math.floor(pl.h/2),pl.w,1);}
      else if(lvl===4){ctx.fillStyle=th.pGr;for(let i=7;i<pl.w;i+=18)ctx.fillRect(pl.x+i,pl.y+1,2,pl.h-2);}
      else if(lvl===5){ctx.fillStyle=th.pGr;for(let i=0;i<pl.w;i+=13)ctx.fillRect(pl.x+i,pl.y,1,pl.h);ctx.fillRect(pl.x,pl.y,pl.w,2);ctx.fillRect(pl.x,pl.y+pl.h-2,pl.w,2);}
    }
  }
}

function drawPlayer(p){
  if(p.inv>0&&Math.floor(p.inv/6)%2===0) return;
  const x=Math.round(p.x),y=Math.round(p.y),s=p.sc||1,f=p.facing;

  // — Pantalón azul —
  ctx.fillStyle='#2255cc';
  ctx.fillRect(x+4*s,y+22*s,8*s,14*s);
  ctx.fillRect(x+14*s,y+22*s,8*s,14*s);
  ctx.fillStyle='#1a3a99';
  ctx.fillRect(x+11*s,y+22*s,4*s,9*s); // separación piernas

  // — Camisa roja —
  ctx.fillStyle='#bb1111';
  ctx.fillRect(x+3*s,y+12*s,20*s,11*s);
  // Franja blanca en la cintura
  ctx.fillStyle='#eeeeee';
  ctx.fillRect(x+3*s,y+20*s,20*s,3*s);

  // — Brazos (piel) —
  ctx.fillStyle='#d4a055';
  ctx.fillRect(x,      y+12*s,4*s,10*s); // brazo izq
  ctx.fillRect(x-1*s,  y+20*s,5*s, 4*s); // mano izq
  ctx.fillRect(x+22*s, y+12*s,4*s,10*s); // brazo der
  ctx.fillRect(x+22*s, y+20*s,5*s, 4*s); // mano der

  // — Cara redonda (dorada) —
  ctx.fillStyle='#d4a055';
  ctx.beginPath();
  ctx.ellipse(x+13*s,y+7*s,10*s,10*s,0,0,Math.PI*2);
  ctx.fill();

  // — Pelo negro (voluminoso, punta hacia un lado) —
  ctx.fillStyle='#111';
  // Base del pelo (cubre arco superior de la cabeza)
  ctx.beginPath();
  ctx.ellipse(x+13*s,y+5*s,10*s,9*s,0,Math.PI,Math.PI*2);
  ctx.fill();
  ctx.fillRect(x+3*s,y-4*s,18*s,6*s);
  // Mechón principal (va hacia la derecha si mira der, izq si mira izq)
  if(f>0){
    ctx.beginPath();
    ctx.moveTo(x+10*s,y-3*s);
    ctx.lineTo(x+19*s,y-10*s);
    ctx.lineTo(x+24*s,y-4*s);
    ctx.lineTo(x+21*s,y+1*s);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x+5*s,y-2*s);
    ctx.lineTo(x+12*s,y-8*s);
    ctx.lineTo(x+16*s,y-4*s);
    ctx.fill();
    ctx.fillRect(x+19*s,y+1*s,3*s,5*s); // patilla der
  } else {
    ctx.beginPath();
    ctx.moveTo(x+16*s,y-3*s);
    ctx.lineTo(x+7*s,y-10*s);
    ctx.lineTo(x+2*s,y-4*s);
    ctx.lineTo(x+5*s,y+1*s);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x+21*s,y-2*s);
    ctx.lineTo(x+14*s,y-8*s);
    ctx.lineTo(x+10*s,y-4*s);
    ctx.fill();
    ctx.fillRect(x+4*s,y+1*s,3*s,5*s); // patilla izq
  }

  // — Cejas gruesas (expresión seria/enojada) —
  ctx.fillStyle='#111';
  if(f>0){
    ctx.fillRect(x+7*s, y+5*s,5*s,2*s); // izq
    ctx.fillRect(x+14*s,y+4*s,5*s,2*s); // der (más alta = enfado)
    ctx.fillRect(x+18*s,y+3*s,2*s,1*s); // punta
  } else {
    ctx.fillRect(x+7*s, y+4*s,5*s,2*s); // izq (más alta)
    ctx.fillRect(x+14*s,y+5*s,5*s,2*s); // der
    ctx.fillRect(x+7*s, y+3*s,2*s,1*s); // punta
  }

  // — Ojos —
  ctx.fillStyle='#1a1a1a';
  if(f>0){
    ctx.fillRect(x+8*s, y+8*s,4*s,3*s);
    ctx.fillRect(x+15*s,y+8*s,4*s,3*s);
  } else {
    ctx.fillRect(x+7*s, y+8*s,4*s,3*s);
    ctx.fillRect(x+14*s,y+8*s,4*s,3*s);
  }

  // — Marcas de mejillas (estilo chibi) —
  ctx.fillStyle='#c08040';
  ctx.fillRect(x+4*s, y+11*s,3*s,2*s);
  ctx.fillRect(x+19*s,y+11*s,3*s,2*s);

  // — Boca pequeña —
  ctx.fillStyle='#883300';
  ctx.fillRect(x+10*s,y+14*s,6*s,1*s);

  // — Outline negro (estilo cartoon) —
  ctx.strokeStyle='#111';ctx.lineWidth=s*1.2;
  ctx.beginPath();ctx.ellipse(x+13*s,y+7*s,10*s,10*s,0,0,Math.PI*2);ctx.stroke();
}

function drawEnemy(e,lvl){
  if(e.x<-50) return;
  const x=Math.round(e.x),y=Math.round(e.y),th=T[lvl];
  const fl=e.ft>0&&Math.floor(e.ft/4)%2===0;

  if(lvl===1||lvl===4){
    // Demon / lava monster
    ctx.fillStyle=fl?'#fff':th.eB;ctx.fillRect(x,y+6,e.w,e.h-6);
    ctx.fillStyle=fl?'#fff':th.eH;ctx.fillRect(x+2,y,e.w-4,13);
    if(!fl){
      ctx.fillStyle='#fff';ctx.fillRect(x+4,y+3,5,5);ctx.fillRect(x+e.w-9,y+3,5,5);
      ctx.fillStyle='#000';ctx.fillRect(x+(e.dir>0?7:5),y+4,2,3);ctx.fillRect(x+(e.dir>0?e.w-7:e.w-9),y+4,2,3);
      ctx.fillStyle=th.eHorn;ctx.fillRect(x+3,y-5,4,7);ctx.fillRect(x+e.w-7,y-5,4,7);
      if(lvl===4){ctx.fillStyle='#ff6600';ctx.fillRect(x+2,y+e.h-1,4,6);ctx.fillRect(x+e.w-6,y+e.h-1,4,6);}
    }
  } else if(lvl===2){
    // Bat
    const cx=x+e.w/2,cy=y+e.h/2;
    ctx.fillStyle=fl?'#fff':th.eH;
    ctx.beginPath();ctx.moveTo(cx-3,cy);ctx.lineTo(x-9,y+5);ctx.lineTo(x+1,y+e.h-3);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+3,cy);ctx.lineTo(x+e.w+9,y+5);ctx.lineTo(x+e.w-1,y+e.h-3);ctx.closePath();ctx.fill();
    ctx.fillStyle=fl?'#fff':th.eB;ctx.beginPath();ctx.arc(cx,cy,e.w*0.34,0,Math.PI*2);ctx.fill();
    if(!fl){
      ctx.fillStyle='#ff0000';ctx.fillRect(cx-5,y+4,4,3);ctx.fillRect(cx+1,y+4,4,3);
      ctx.fillStyle='#fff';ctx.fillRect(cx-2,y+e.h-1,2,6);ctx.fillRect(cx+2,y+e.h-1,2,6);
    }
  } else if(lvl===3){
    // Bird
    const cx=x+e.w/2,cy=y+e.h/2;
    const wf=Math.sin(game.time*0.25)*6;
    ctx.fillStyle=fl?'#fff':th.eH;
    ctx.fillRect(x-6,cy-3-wf,8,5);ctx.fillRect(x+e.w-2,cy-3-wf,8,5);
    ctx.fillStyle=fl?'#fff':th.eB;ctx.beginPath();ctx.arc(cx,cy,e.w*0.38,0,Math.PI*2);ctx.fill();
    if(!fl){
      ctx.fillStyle='#ffaa00';ctx.fillRect(e.dir>0?x+e.w-2:x-6,cy-1,6,3);
      ctx.fillStyle='#fff';ctx.fillRect(cx+(e.dir>0?-9:2),cy-5,5,5);
      ctx.fillStyle='#000';ctx.fillRect(cx+(e.dir>0?-8:3),cy-4,2,3);
    }
  } else if(lvl===5){
    // Alien
    const cx=x+e.w/2,cy=y+e.h/2;
    ctx.fillStyle=fl?'#fff':th.eB;ctx.fillRect(x+4,cy+2,e.w-8,e.h/2-2);
    ctx.fillStyle=fl?'#fff':th.eH;ctx.beginPath();ctx.arc(cx,cy-1,e.w*0.44,0,Math.PI*2);ctx.fill();
    if(!fl){
      ctx.fillStyle='#001100';ctx.beginPath();ctx.arc(cx,cy-1,e.w*0.2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#00ff44';ctx.beginPath();ctx.arc(cx,cy-1,e.w*0.09,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=th.eHorn;ctx.fillRect(cx-1,y-9,2,9);ctx.beginPath();ctx.arc(cx,y-9,3,0,Math.PI*2);ctx.fill();
    }
  }
  if(e.maxHp>1){
    ctx.fillStyle='#333';ctx.fillRect(x,y-10,e.w,4);
    ctx.fillStyle=e.hp/e.maxHp>0.5?'#44ff44':'#ff4444';ctx.fillRect(x,y-10,e.w*(e.hp/e.maxHp),4);
  }
}

function drawCoin(c,t){
  if(c.c) return;
  const wb=Math.sin(t*0.07+c.x)*3,cx=Math.round(c.x),cy=Math.round(c.y+wb);
  ctx.fillStyle='#f7c948';ctx.beginPath();ctx.arc(cx,cy,9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff8';ctx.beginPath();ctx.arc(cx-2,cy-2,3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#c4881e';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,9,0,Math.PI*2);ctx.stroke();
}

function drawFlag(f,t){
  ctx.fillStyle='#aaa';ctx.fillRect(f.x+8,f.y-10,4,90);
  const w=Math.sin(t*0.08)*4;
  ctx.fillStyle='#e63946';
  ctx.beginPath();ctx.moveTo(f.x+12,f.y-10);ctx.lineTo(f.x+36+w,f.y+2);ctx.lineTo(f.x+12,f.y+14);ctx.closePath();ctx.fill();
}

function drawProjectile(proj,lvl){
  ctx.save();
  ctx.shadowColor=proj.glow;ctx.shadowBlur=14;ctx.fillStyle=proj.col;
  const d=Math.sign(proj.vx);
  if(lvl===5){
    ctx.strokeStyle=proj.col;ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(proj.x-22*d,proj.y);ctx.lineTo(proj.x+22*d,proj.y);ctx.stroke();
    ctx.globalAlpha=0.5;ctx.lineWidth=8;ctx.strokeStyle=proj.glow;
    ctx.beginPath();ctx.moveTo(proj.x-22*d,proj.y);ctx.lineTo(proj.x+22*d,proj.y);ctx.stroke();
  } else if(lvl===3){
    ctx.strokeStyle=proj.col;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(proj.x-12*d,proj.y);ctx.lineTo(proj.x-4*d,proj.y-7);ctx.lineTo(proj.x+4*d,proj.y+5);ctx.lineTo(proj.x+12*d,proj.y-2);ctx.stroke();
    ctx.globalAlpha=0.35;ctx.lineWidth=7;ctx.strokeStyle='#fff';ctx.stroke();
  } else {
    ctx.beginPath();ctx.arc(proj.x,proj.y,proj.r,0,Math.PI*2);ctx.fill();
    if(lvl===2){
      ctx.globalAlpha=1;ctx.strokeStyle='#888';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(proj.x,proj.y-proj.r);ctx.lineTo(proj.x+4*d,proj.y-proj.r-5);ctx.stroke();
      ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(proj.x+4*d,proj.y-proj.r-5,2.5,0,Math.PI*2);ctx.fill();
    } else if(lvl===4){
      ctx.globalAlpha=0.45;ctx.fillStyle='#ffaa00';
      ctx.beginPath();ctx.arc(proj.x-proj.vx*2,proj.y,proj.r*0.65,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();
}

function drawMinimap(){
  if(!game||game.worldW<=canvas.width) return;
  const mw=120,mh=8,mx=canvas.width-mw-10,my=10;
  ctx.fillStyle='#ffffff15';ctx.fillRect(mx,my,mw,mh);
  ctx.fillStyle='#e63946';ctx.fillRect(mx+(game.player.x/game.worldW)*mw-2,my,4,mh);
  ctx.fillStyle='#f7c948';ctx.fillRect(mx+(game.flag.x/game.worldW)*mw,my,3,mh);
  ctx.strokeStyle='#ffffff30';ctx.lineWidth=1;ctx.strokeRect(mx,my,mw,mh);
}

function drawHUD(){
  const th=T[game.level],w=th.wpn;
  ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(8,8,150,18);
  ctx.fillStyle=w.glow;ctx.font='7px "Press Start 2P",monospace';
  ctx.fillText(th.label+'  ⚔ '+w.name,13,21);
}

function draw(){
  if(!game) return;
  const t=game.time,lvl=game.level;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBg(t,lvl);
  ctx.save();ctx.translate(-game.cam.x,0);
  for(const pl of game.platforms) drawPlatform(pl,lvl);
  drawFlag(game.flag,t);
  for(const c of game.coins) drawCoin(c,t);
  for(const e of game.enemies) drawEnemy(e,lvl);
  drawPlayer(game.player);
  for(const proj of game.projectiles) drawProjectile(proj,lvl);
  for(const pt of game.particles){ctx.globalAlpha=pt.life;ctx.fillStyle=pt.col;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;ctx.restore();
  drawMinimap();drawHUD();
}

function loop(){update();draw();animFrame=requestAnimationFrame(loop);}

document.getElementById('startBtn').addEventListener('click',()=>{
  overlay.style.display='none';scoreEl.textContent='0';livesEl.textContent='❤️❤️❤️';levelEl.textContent='1';
  game=null;initGame(1);loop();
});
window.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// Mobile
const ms=document.createElement('style');
ms.textContent=`#mc{display:flex;gap:10px;margin-top:10px;}.mB{font-family:'Press Start 2P',monospace;font-size:11px;width:52px;height:52px;background:#f7c94820;border:2px solid #f7c948;color:#f7c948;cursor:pointer;user-select:none;border-radius:4px;display:flex;align-items:center;justify-content:center;}.mB:active{background:#f7c94840;}`;
document.head.appendChild(ms);
const mc=document.createElement('div');mc.id='mc';
mc.innerHTML=`<button class="mB" id="mL">◀</button><button class="mB" id="mJ">↑</button><button class="mB" id="mF">⚡</button><button class="mB" id="mR">▶</button>`;
document.body.appendChild(mc);
[['mL','ArrowLeft'],['mR','ArrowRight'],['mJ',' '],['mF','z']].forEach(([id,k])=>{
  document.getElementById(id).addEventListener('touchstart',e=>{keys[k]=true;e.preventDefault();},{passive:false});
  document.getElementById(id).addEventListener('touchend',()=>keys[k]=false);
});
</script>
</body>
</html>
